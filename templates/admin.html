<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Cozy Nest Space</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tiny.cloud/1/prfkrag1ybha5j59szmp1p4z18eq2g3atavicfy4j0i3pjlz/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    
    <script>
      tinymce.init({
        selector: 'textarea[name="content"]',
        plugins: 'image link lists',
        toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | image link',
        height: 350,
        content_style: `
            @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap');
            body { font-family: 'Inter', sans-serif !important; font-size: 16px !important; color: #4e342e !important; }
            h1, h2, h3 { font-family: 'Playfair Display', serif !important; color: #4e342e !important; }
        `
      });
    </script>
    
    <style>
        body { background-color: #fcf9f5; color: #4e342e; font-family: "Inter", sans-serif; font-size: 14px; }
        h1, h2, h3, h4, .brand-logo { font-family: "Playfair Display", serif; color: #4e342e; }
        .sidebar { background-color: #5d4037; min-height: 100vh; padding-top: 25px; }
        .brand-logo { font-size: 24px; color: #ffffff !important; display: block; text-align: center; text-decoration: none; letter-spacing: -0.5px; }
        
        .sidebar .nav-link { 
            color: #d7ccc8 !important; padding: 12px 20px; border-radius: 6px; margin: 5px 15px;
            font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 12px; transition: all 0.2s ease;
        }
        .sidebar .nav-link svg { width: 18px; height: 18px; stroke-width: 1.5; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { background-color: #8d6e63; color: white !important; }
        
        .content-box { background: #ffffff; padding: 35px; border-radius: 12px; border: 1px solid #d7ccc8; margin-top: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .btn-custom { background-color: #8d6e63; color: white; padding: 10px 25px; border-radius: 6px; border: none; text-transform: uppercase; font-size: 13px; }
        .btn-custom:hover { background-color: #5d4037; color: white; }
        
        input, textarea { border: 1px solid #d7ccc8 !important; background-color: #fcf9f5 !important; }
        .table { color: #4e342e !important; }
        
        /* --- ADDED FOR RESPONSIVENESS --- */
        @media (max-width: 768px) {
            .content-box { padding: 20px; margin-top: 15px; }
            .sidebar { min-height: auto; padding-bottom: 20px; }
            .sidebar .nav-link { justify-content: center; }
            .brand-logo { font-size: 22px; }
            h2, h3 { font-size: 20px !important; }
        }
    </style>
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <div class="col-md-3 col-lg-2 px-0 sidebar">
                <a class="brand-logo mb-4" href="/">Cozy Nest Space</a>
                <div class="nav flex-column">
                    <a href="/admin" class="nav-link active"><i data-lucide="file-text"></i> Posts Manager</a>
                    <a href="/stats" class="nav-link"><i data-lucide="bar-chart-3"></i> Stats / Analytics</a>
                    <hr class="text-white mx-3">
                    <a href="/" class="nav-link"><i data-lucide="globe"></i> View Website</a>
                    <a href="/logout" class="nav-link text-danger"><i data-lucide="log-out"></i> Logout</a>
                </div>
            </div>

            <div class="col-md-9 col-lg-10 px-4">
                <div class="content-box">
                    <h2 class="mb-4" style="font-weight: 400;">{{ session.get('admin_greeting', 'Welcome, Admin') }}</h2>
                    <h3 class="mb-4" style="font-weight: 400; font-size: 20px; color: #8d6e63;">Create New Post</h3>
                    <form method="POST" action="/admin" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-8 mb-3">
                                <label>Post Title</label>
                                <input type="text" name="title" class="form-control" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label>Category</label>
                                <input type="text" name="category" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Header Image</label>
                            <input type="file" name="image_file" class="form-control" accept="image/*">
                        </div>
                        <div class="mb-4">
                            <label>Blog Content</label>
                            <textarea name="content" class="form-control"></textarea>
                        </div>
                        <button type="submit" class="btn btn-custom">Publish Post</button>
                    </form>
                </div>

                <div class="content-box">
                    <h3 class="mb-4" style="font-weight: 400; font-size: 22px;">Manage Existing Posts</h3>
                    <div class="table-responsive">
                        <table class="table table-striped align-middle">
                            <thead class="table-dark">
                                <tr>
                                    <th>Title</th>
                                    <th>Category</th>
                                    <th style="text-align: right;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for post in all_posts %}
                                <tr>
                                    <td>{{ post['title'] }}</td>
                                    <td><span class="badge" style="background-color: #8d6e63;">{{ post['category'] }}</span></td>
                                    <td style="text-align: right;">
                                        <a href="/edit/{{ post['id'] }}" class="btn btn-sm btn-outline-secondary">Edit</a>
                                        <a href="/delete/{{ post['id'] }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure?')">Delete</a>
                                    </td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
