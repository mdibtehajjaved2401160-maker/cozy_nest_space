<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Post - Cozy Nest Space</title>
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.tiny.cloud/1/prfkrag1ybha5j59szmp1p4z18eq2g3atavicfy4j0i3pjlz/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    
    <script>
      tinymce.init({
        selector: 'textarea[name="content"]',
        plugins: 'image link lists',
        toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | image link',
        height: 400
      });
    </script>

    <style>
        body { background-color: #fcf9f5; color: #4e342e; font-family: "Inter", sans-serif; font-size: 14px; }
        .navbar { background-color: #5d4037 !important; padding: 15px 0; }
        .brand-logo { font-size: 26px; text-decoration: none; font-family: "Playfair Display", serif; color: #ffffff !important; font-weight: 500; }
        .nav-link { color: #ffffff !important; font-size: 13px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
        .content-box { 
            background: #ffffff; padding: 40px; border-radius: 12px; 
            border: 1px solid #d7ccc8; box-shadow: 0 4px 15px rgba(0,0,0,0.02); 
            margin-top: 30px;
        }
        .btn-custom { background-color: #8d6e63; color: white; border: none; padding: 10px 25px; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; font-weight: 500; border-radius: 6px; }
        .btn-custom:hover { background-color: #5d4037; color: white; }
        input, textarea { border: 1px solid #d7ccc8 !important; background-color: #fcf9f5 !important; border-radius: 6px !important; }
        label { font-weight: 500; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

        /* --- ADDED FOR RESPONSIVENESS --- */
        @media (max-width: 576px) {
            .content-box { padding: 20px; margin-top: 15px; }
            .brand-logo { font-size: 20px; }
            h3 { font-size: 22px !important; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand-logo" href="/">Cozy Nest Space</a>
            <div class="d-flex gap-3">
                <a href="/admin" class="nav-link"><i data-lucide="layout-dashboard" style="width: 16px; height: 16px;"></i> Dashboard</a>
                <a href="/logout" class="nav-link text-danger"><i data-lucide="log-out" style="width: 16px; height: 16px;"></i> Logout</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="content-box">
            <h3 class="mb-4" style="font-family: 'Playfair Display'; font-weight: 400;">Edit Post: {{ post['title'] }}</h3>
            
            <form method="POST" enctype="multipart/form-data">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label>Post Title</label>
                        <input type="text" name="title" class="form-control" value="{{ post['title'] }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Category</label>
                        <input type="text" name="category" class="form-control" value="{{ post['category'] }}" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Header Image (Optional - Select to Change)</label>
                    <input type="file" name="image_file" class="form-control" accept="image/*">
                    <small class="text-muted">Current: {{ post['image_url'] }}</small>
                </div>

                <div class="mb-3">
                    <label>Blog Content</label>
                    <textarea name="content" class="form-control">{{ post['content'] }}</textarea>
                </div>
                
                <button type="submit" class="btn btn-custom">Update Post</button>
                <a href="/admin" class="btn btn-outline-secondary ms-2" style="font-size: 13px; padding: 10px 20px; border-radius: 6px;">Cancel</a>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
