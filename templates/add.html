<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Post - Cozy Nest Space</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- TinyMCE Rich Text Editor -->
    <script src="https://cdn.tiny.cloud/1/prfkrag1ybha5j59szmp1p4z18eq2g3atavicfy4j0i3pjlz/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <script>
      tinymce.init({
        selector: 'textarea[name="content"]',
        plugins: 'image link lists',
        toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | image link',
        height: 400
      });
    </script>
<style>
    /* 🎨 Original Warm Color Palette System */
    body { 
        background-color: #fcf9f5; 
        color: #4e342e; 
        font-family: "Inter", sans-serif; 
        font-size: 14px;
        -webkit-font-smoothing: antialiased;
    }
    
    h1, h2, h3, .brand-logo {
        font-family: "Playfair Display", serif;
        color: #4e342e;
    }
    
    label { 
        font-family: "Inter", sans-serif; 
        font-weight: 500; 
        font-size: 12px; 
        text-transform: uppercase; 
        letter-spacing: 0.5px;
        color: #4e342e;
        margin-bottom: 6px;
    }

    .navbar { background-color: #5d4037 !important; padding: 15px 0; }
    
    .brand-logo { 
        font-size: 30px; 
        text-decoration: none; 
        letter-spacing: -0.5px;
        color: #ffffff !important; 
    }
    
    .nav-link { 
        color: #ffffff !important; 
        font-size: 13px; 
        font-weight: 500; 
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    
    .content-box { 
        background: #ffffff; 
        padding: 40px; 
        border-radius: 12px; 
        border: 1px solid #d7ccc8;
        box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        margin-top: 30px;
        margin-bottom: 40px;
    }
    
    .btn-custom { 
        background-color: #8d6e63; 
        color: white; 
        border: none; 
        padding: 10px 25px; 
        font-size: 13px; 
        text-transform: uppercase; 
        letter-spacing: 1px;
        font-weight: 500;
        border-radius: 6px;
    }
    .btn-custom:hover { background-color: #5d4037; color: white; }
    
    /* Clean Inputs */
    input, select, textarea { 
        border: 1px solid #d7ccc8 !important; 
        background-color: #fcf9f5 !important; 
        border-radius: 6px !important; 
        padding: 10px 14px !important;
        color: #4e342e !important;
    }
    input:focus, select:focus {
        box-shadow: 0 0 0 0.25rem rgba(141, 110, 99, 0.15) !important;
        border-color: #8d6e63 !important;
    }
</style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="brand-logo" href="/">Cozy Nest Space</a>
            <div class="d-flex">
                <a href="/admin" class="nav-link me-3">Dashboard</a>
                <a href="/logout" class="nav-link text-danger">Logout</a>
            </div>
        </div>
    </nav>

    <!-- Main Form Box -->
    <div class="container">
        <div class="content-box">
            <h3 class="mb-4" style="font-weight: 400; font-size: 26px;">Create New Post</h3>
            
            <form method="POST">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label>Post Title</label>
                        <input type="text" name="title" class="form-control" placeholder="Enter a beautiful title..." required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label>Category</label>
                        <input type="text" name="category" class="form-control" placeholder="e.g., Living Room, Bedroom" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label>Header Image URL</label>
                    <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
                </div>

                <div class="mb-4">
                    <label>Blog Content</label>
                    <textarea name="content" class="form-control"></textarea>
                </div>
                
                <button type="submit" class="btn btn-custom">Publish Post</button>
                <a href="/admin" class="btn btn-outline-secondary ms-2" style="font-size: 13px; padding: 10px 20px; border-radius: 6px;">Cancel</a>
            </form>
        </div>
    </div>

</body>
</html>
